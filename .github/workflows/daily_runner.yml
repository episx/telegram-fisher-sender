name: Daily Stock Checker

on:
  schedule:
    - cron: '0 18 * * *'  # Her gün 18:00 UTC = 21:00 TRT
  workflow_dispatch:  # Manuel tetikleme için

jobs:
  run-stock-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Stock Checker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python stock_diff_checker.py

      - name: Commit updated stock list
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          if [ -f data/previous_stocks.json ]; then
            git add data/previous_stocks.json
            if ! git diff --staged --quiet; then
              git commit -m "Update previous_stocks.json from daily scan [skip ci]"
              git push
              echo "✅ Updated previous_stocks.json committed and pushed"
            else
              echo "ℹ️  No changes to previous_stocks.json"
            fi
          else
            echo "⚠️  previous_stocks.json not found"
          fi